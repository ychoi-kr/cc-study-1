<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#16161e"/>
  <!-- Book shape inspired by wikibooks logo -->
  <line x1="8" y1="20" x2="24" y2="20" stroke="#7c6ff7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="9" y1="15" x2="23" y2="15" stroke="#a49bfa" stroke-width="2" stroke-linecap="round" transform="rotate(-8, 16, 15)"/>
  <line x1="10" y1="10" x2="22" y2="10" stroke="#a49bfa" stroke-width="2" stroke-linecap="round" transform="rotate(6, 16, 10)"/>
  <!-- "1" for 1기 -->
  <text x="16" y="29" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#7c6ff7">1기</text>
</svg>
